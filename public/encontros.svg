<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" width="720" height="1280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E86A3A"/>
      <stop offset="0.5" stop-color="#D9553F"/>
      <stop offset="1" stop-color="#B23C6E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
  <rect width="720" height="1280" fill="url(#glow)"/>
  <!-- encontro: pessoas à volta -->
  <g transform="translate(360 500)" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.95">
    <!-- pessoa central -->
    <circle cx="0" cy="-50" r="42"/>
    <path d="M-70 70 Q0 0 70 70" stroke-linecap="round"/>
    <!-- pessoa esquerda -->
    <circle cx="-150" cy="-10" r="34" opacity="0.8"/>
    <path d="M-205 130 Q-150 70 -95 130" stroke-linecap="round" opacity="0.8"/>
    <!-- pessoa direita -->
    <circle cx="150" cy="-10" r="34" opacity="0.8"/>
    <path d="M95 130 Q150 70 205 130" stroke-linecap="round" opacity="0.8"/>
  </g>
  <!-- balões de conversa -->
  <g transform="translate(360 760)" fill="#ffffff" opacity="0.9">
    <rect x="-120" y="0" width="130" height="66" rx="20"/>
    <path d="M-70 66 l0 26 l24 -26 Z"/>
    <rect x="20" y="30" width="110" height="56" rx="18" opacity="0.75"/>
    <path d="M80 86 l0 22 l-20 -22 Z" opacity="0.75"/>
  </g>
</svg>
