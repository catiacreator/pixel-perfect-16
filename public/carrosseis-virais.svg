<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" width="720" height="1280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E5218C"/>
      <stop offset="0.35" stop-color="#FF7A2F"/>
      <stop offset="0.7" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#3B6EF5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
  <rect width="720" height="1280" fill="url(#glow)"/>
  <!-- carousel stack -->
  <g transform="translate(360 520)">
    <rect x="-150" y="-190" width="300" height="380" rx="28" fill="#ffffff" opacity="0.16" transform="rotate(-10)"/>
    <rect x="-150" y="-190" width="300" height="380" rx="28" fill="#ffffff" opacity="0.24" transform="rotate(-4)"/>
    <rect x="-155" y="-200" width="310" height="400" rx="30" fill="#ffffff" opacity="0.95"/>
    <!-- abstract slide content -->
    <circle cx="-70" cy="-90" r="34" fill="none" stroke="#E5218C" stroke-width="6"/>
    <path d="M-104 -90 L-36 -90 M-70 -124 L-70 -56" stroke="#FF7A2F" stroke-width="6" stroke-linecap="round"/>
    <rect x="-120" y="-10" width="240" height="14" rx="7" fill="#7C3AED"/>
    <rect x="-120" y="24" width="180" height="14" rx="7" fill="#3B6EF5"/>
    <rect x="-120" y="58" width="210" height="14" rx="7" fill="#1C1533" opacity="0.25"/>
    <path d="M-120 150 Q0 110 120 150" fill="none" stroke="#FF7A2F" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- carousel dots -->
  <g transform="translate(360 780)">
    <rect x="-46" y="-6" width="34" height="12" rx="6" fill="#ffffff"/>
    <circle cx="6" cy="0" r="6" fill="#ffffff" opacity="0.6"/>
    <circle cx="30" cy="0" r="6" fill="#ffffff" opacity="0.6"/>
    <circle cx="54" cy="0" r="6" fill="#ffffff" opacity="0.6"/>
  </g>
</svg>
